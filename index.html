<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firstlight</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="/index.js"></script>
</head>

<body class="bg-no-repeat bg-center bg-fixed bg-cover font-sans text-white">
    <main class="flex flex-col h-screen p-4">
        <div class="flex justify-between [text-shadow:0px_0px_20px_#aaaaaa] md:text-xl h-1/3 items-start">
            <div id="crypto-stats"></div>
            <div id="weather-info">Weather</div>
        </div>

        <div class="flex h-1/3 items-center justify-center">
            <h1 id="current-time" class="text-6xl [text-shadow:2px_2px_2px_#474747]"></h1>
        </div>

        <div class="flex h-1/3 items-end">
            <div id="user-name" class="text-black text-sm font-mono bg-white self-end px-2 py-1"></div>
        </div>
    </main>
</body>

</html>
