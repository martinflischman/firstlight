<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firstlight</title>
    <script src="/tailwind.js"></script>
    <script defer type="module" src="/index.js"></script>
</head>

<body class="bg-no-repeat bg-center bg-fixed bg-cover font-sans text-white">
    <main class="flex flex-col h-screen p-4">
        <div class="flex justify-between h-1/3 items-start">
            <div id="crypto-stats" aria-label="Cryptocurrency data"
                class="bg-black/50 rounded-lg p-3 [text-shadow:0px_0px_20px_#aaaaaa] md:text-xl"></div>
            <div aria-label="Weather data"
                class="flex flex-col items-end bg-black/50 rounded-lg p-3 [text-shadow:0px_0px_20px_#aaaaaa] md:text-xl">
                <div class="flex items-center">
                    <img id="weather-icon" src="" alt="Weather icon" class="w-16 h-16">
                    <p id="weather-temp" class="text-4xl font-bold"></p>
                </div>
                <p id="weather-city" class="w-full text-center"></p>
            </div>
        </div>

        <div class="flex h-1/3 items-center justify-center">
            <time id="current-time" class="text-8xl font-bold [text-shadow:2px_2px_2px_#474747]"></time>
        </div>

        <div class="flex h-1/3 items-end">
            <div id="user-name" class="text-white text-sm font-mono bg-black/50 rounded self-end px-3 py-2"></div>
        </div>
    </main>
</body>

</html>
